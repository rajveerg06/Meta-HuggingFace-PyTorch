name: invoice_receipt_openenv
version: 1.1.0
description: >
  OpenEnv-compatible environment for invoice and receipt document understanding.
  An AI agent processes OCR text from financial documents through a structured
  classify → extract → validate → finish pipeline with deterministic grading.

author: OpenEnv Contributors
license: MIT
homepage: https://huggingface.co/spaces/openenv/invoice-receipt

entrypoint: env.openenv_env:OpenEnvInvoiceEnv

api:
  base_url: http://localhost:7860
  reset: /reset
  step: /step
  state: /state
  health: /health
  tasks: /tasks

observation:
  fields:
    - sample_id
    - difficulty
    - ocr_text
    - predicted_document_type
    - extracted_fields.vendor_name
    - extracted_fields.total_amount
    - extracted_fields.date
    - extracted_fields.confidence
    - validation_passed
    - progress
    - steps_taken
    - max_steps
    - available_actions
    - last_action
    - done
    - info

action_space:
  type: Discrete
  n: 4
  actions:
    - name: classify_document
      payload:
        document_type: "invoice | receipt"
    - name: extract_fields
      payload:
        fields:
          vendor_name: string
          total_amount: string
          date: string
    - name: validate_fields
      payload:
        is_valid: bool
    - name: finish
      payload: {}

reward:
  range: [0.0, 1.0]
  scoring:
    - classification_accuracy
    - extraction_accuracy
    - completeness
    - vendor_name_score
    - total_amount_score
    - date_score
  reward_shaping:
    correct_action: +0.2 to +0.5 (difficulty scaled)
    incorrect_action: -0.1
    loop_penalty: -0.05 per repeat
    finish_bonus: 0.6 × grader_score
    timeout_penalty: -0.1

dataset:
  sources:
    - name: SROIE
      description: Scanned Receipts OCR and Information Extraction dataset
      url: https://rrc.cvc.uab.es/?ch=13
    - name: Invoice Dataset
      description: Synthetic and real-world invoice OCR dataset
    - name: RVL-CDIP Subset
      description: Ryerson Vision Lab Complex Document Information Processing
      url: https://adamharley.com/rvl-cdip/
  local_path: data/samples/documents.jsonl
  format: jsonl
  splits:
    - train
    - val
    - test
  total_samples: 30
  samples_per_difficulty:
    easy: 10
    medium: 10
    hard: 10

tasks:
  - id: classify-document
    difficulty: easy
    objective: Classify whether the input document is an invoice or receipt.
    required_actions:
      - classify_document
      - finish
    grading:
      classification_accuracy: 1.0
  - id: extract-key-fields
    difficulty: medium
    objective: Extract vendor name, total amount, and date from OCR text.
    required_actions:
      - extract_fields
      - finish
    grading:
      extraction_accuracy: 0.8
      completeness: 0.2
  - id: full-pipeline
    difficulty: hard
    objective: Classify document, extract key fields, and validate the extraction.
    required_actions:
      - classify_document
      - extract_fields
      - validate_fields
      - finish
    grading:
      classification_accuracy: 0.4
      extraction_accuracy: 0.4
      completeness: 0.2

baseline_scores:
  agent: heuristic
  seed: 42
  episodes_per_level: 3
  easy: 1.0000
  medium: 0.9444
  hard: 0.9111
  overall: 0.9518
  note: Scores use rapidfuzz fuzzy vendor matching. Reproducible with seed=42.

features:
  - fuzzy_vendor_matching: true
  - per_field_confidence: true  # LLM agents only
  - multi_split_dataset: true
  - openai_agent: true  # optional, requires OPENAI_API_KEY
  - ocr_image_input: optional  # requires pytesseract + Tesseract binary
  - docker_ready: true
  - huggingface_spaces_ready: true
