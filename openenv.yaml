name: invoice-receipt-openenv
version: 1.2.0
description: >
  OpenEnv Round 1 compliant environment for invoice and receipt document
  understanding. Given OCR text of a financial document, an agent must
  classify the document type, extract key fields, and validate the extraction.
author: rajveerg06
license: MIT
entrypoint: env.openenv_env:OpenEnvInvoiceEnv

api:
  base_url: http://localhost:7860
  reset: /reset
  step: /step
  state: /state
  health: /health

interfaces:
  methods:
    - reset
    - step
    - state
  step_returns:
    - observation
    - reward
    - done
    - info

models:
  observation: models.schemas.Observation
  action: models.schemas.Action
  reward: models.schemas.Reward

action_space:
  type: Discrete
  n: 4
  actions:
    - classify_document
    - extract_fields
    - validate_fields
    - finish

observation_space:
  fields:
    - sample_id
    - difficulty
    - ocr_text
    - predicted_document_type
    - extracted_fields
    - validation_passed
    - progress
    - steps_taken
    - max_steps
    - available_actions
    - last_action
    - done
    - info

reward:
  score_range: [0.0, 1.0]
  shaping:
    partial_progress: true
    wrong_action_penalty: -0.1
    loop_penalty_per_repeat: -0.05
    invalid_step_penalty: -0.1
    finish_bonus_multiplier: 0.6

tasks:
  - id: classify-document
    difficulty: easy
    objective: >
      Given OCR text of a financial document, classify whether it is an
      invoice or a receipt. Models must apply document-type reasoning over
      unstructured text containing keywords, formatting patterns, and layout cues.

  - id: extract-key-fields
    difficulty: medium
    objective: >
      Extract vendor name, total amount, and date from the OCR text of an
      invoice or receipt. Models must handle varied formatting, currency symbols,
      date formats, and noisy OCR artifacts from real-world documents.

  - id: full-pipeline
    difficulty: hard
    objective: >
      Perform the complete document processing pipeline: classify document type,
      extract all key fields (vendor name, total amount, date), and validate the
      extraction for completeness and structural correctness. All steps must
      succeed for maximum score.

grader:
  deterministic: true
  output_range: [0.0, 1.0]
  non_constant: true
  scoring:
    easy: classification_accuracy
    medium: 0.8 * extraction_accuracy + 0.2 * completeness
    hard: 0.4 * classification_accuracy + 0.4 * extraction_accuracy + 0.2 * completeness

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN

runtime:
  target_max_runtime_minutes: 20
  cpu: 2
  memory_gb: 8

docker:
  dockerfile: Dockerfile
  port: 7860
  healthcheck: /health
